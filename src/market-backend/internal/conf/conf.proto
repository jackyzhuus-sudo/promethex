syntax = "proto3";
package kratos.api;

option go_package = "market-backend/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Custom custom = 3;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  
  HTTP http = 1;
}

message Data {
  message Redis {
    string network = 1;
    string addr = 2;
    int32 db = 3;
    string password = 4;
    google.protobuf.Duration read_timeout = 5;
    google.protobuf.Duration write_timeout = 6;
    google.protobuf.Duration dial_timeout = 7;
  }

  message Rpc {
    message Rpc_client {
      string addr = 1;
      google.protobuf.Duration timeout = 2;
    }
    Rpc_client usercenter_rpc = 1;
    Rpc_client marketcenter_rpc = 2;
  }

  message Privy {
    string verification_key = 1;
    string app_id = 2;
    string app_secret = 3;
  }

  message OpenAI {
    string api_key = 1;
    string base_url = 2;
    string model = 3;
    float temperature = 4;
    int32 max_tokens = 5;
    float top_p = 6;
    float frequency_penalty = 7;
    float presence_penalty = 8;
    string prompt_template = 9;
  }

  Redis redis = 1;
  Rpc rpc = 2;
  Privy privy = 3;
  OpenAI openai = 4;
}


message Custom {
  message AssetToken {
    string address = 1;
    string name = 2;
    string symbol = 3;
    uint32 decimals = 4;
  }

  string env = 1;
  bool need_auth = 2;
  string lark_webhook_key = 3;
  bool lark_enabled = 4;
  string magiclink_secret_api_key = 5;
  string magiclink_client_id = 6;
  map<string, AssetToken> asset_tokens = 7;  // key = lowercase hex address
  string test_uid = 8;
}
