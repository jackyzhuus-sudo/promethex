//==============================
// 通用结构
//==============================

// 用户操作信息 (UserOperation 0.7)
// 包含区块链交易所需的完整参数集
message UserOperation {
  // 合约钱包地址
  // 用户的智能合约钱包地址
  string sender = 1;
  
  // 交易序号
  // 用于防止重放攻击的递增序号
  string nonce = 2;
  
  // 合约部署代码
  // 如果是首次使用，包含合约部署的初始化代码
  string init_code = 3;
  
  // 调用数据
  // 智能合约调用的编码数据
  string call_data = 4;
  
  // 执行gas限制
  // 执行交易的最大gas限制
  string call_gas_limit = 5;
  
  // 验证gas限制
  // 验证交易的最大gas限制
  string verification_gas_limit = 6;
  
  // 预验证gas
  // 预验证阶段消耗的gas
  string pre_verification_gas = 7;
  
  // 最大gas价格
  // 愿意支付的最高gas价格
  string max_fee_per_gas = 8;
  
  // 最大优先gas价格
  // 愿意支付给矿工的最大优先费用
  string max_priority_fee_per_gas = 9;
  
  // 交易签名
  // 用户对交易的ECDSA签名
  string signature = 10;

  // 工厂合约地址
  // 创建合约钱包的工厂合约地址 (0.7新增)
  string factory = 11;

  // factory数据
  // factory合约的验证数据 (0.7新增)
  string factory_data = 12;
  
  // Paymaster地址
  // 代付gas费的Paymaster合约地址 (0.7新增)
  string paymaster = 13;

  // Paymaster数据
  // Paymaster合约的验证数据 (0.7新增)
  string paymaster_data = 14;
  
  // Paymaster验证gas限制
  // Paymaster验证阶段的gas限制 (0.7新增)
  string paymaster_verification_gas_limit = 15;
  
  // Paymaster后处理gas限制
  // Paymaster后处理操作的gas限制 (0.7新增)
  string paymaster_post_op_gas_limit = 16;
  
}


