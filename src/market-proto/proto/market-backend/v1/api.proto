// Event 状态
enum EventStatus {
  EVENT_STATUS_UNSPECIFIED = 0;
  EVENT_STATUS_ACTIVE = 1;
  EVENT_STATUS_RESOLVED = 2;
  EVENT_STATUS_VOIDED = 3;
  EVENT_STATUS_FROZEN = 4;
}

// 获取 Event 详情请求
message GetEventDetailRequest {
  // event_id (on-chain NegRisk eventId) 或数据库 UUID
  string id = 1;
}

// 获取 Event 详情响应
message GetEventDetailReply {
  message Market {
    message Option {
      // 选项合约地址
      string address = 1;
      // 选项名称
      string name = 2;
      // 选项符号
      string symbol = 3;
      // 选项图片
      string pic_url = 4;
      // 精度
      uint32 decimal = 5;
      // 选项序号
      uint32 index = 6;
      // 当前价格
      string price = 7;
      // 选项描述
      string description = 8;
      // ERC1155 position token ID
      string position_id = 9;
    }

    // 市场地址
    string address = 1;
    // 市场名称
    string name = 2;
    // 市场图片
    string pic_url = 3;
    // 市场描述
    string description = 4;
    // 市场状态
    uint32 status = 5;
    // 参与者数量
    uint32 participants_count = 6;
    // 交易量
    string volume = 7;
    // 精度
    uint32 decimal = 8;
    // 创建时间
    uint32 created_at = 9;
    // 截止时间
    uint32 deadline = 10;
    // 结果
    string result = 11;
    // CTF conditionId
    string condition_id = 12;
    // CTF questionId
    string question_id = 13;
    // 选项列表
    repeated Option options = 14;
  }

  // 数据库 ID
  string id = 1;
  // on-chain NegRisk eventId (bytes32 hex)
  string event_id = 2;
  // 标题
  string title = 3;
  // outcome 数量
  int32 outcome_slot_count = 4;
  // 抵押品地址 (USDC)
  string collateral = 5;
  // 状态
  EventStatus status = 6;
  // metadata hash
  string metadata_hash = 7;
  // 创建时间
  uint32 created_at = 8;
  // 更新时间
  uint32 updated_at = 9;
  // 子市场列表
  repeated Market markets = 10;
}

// 获取 Event 列表请求
message GetEventsRequest {
  enum SortType {
    SORT_TYPE_UNKNOWN = 0;
    SORT_TYPE_LATEST = 1;
    SORT_TYPE_VOLUME = 2;
  }
  // 状态筛选
  EventStatus status = 1;
  // 排序方式
  SortType sort_type = 2;
  // 页码
  uint32 page = 3;
  // 每页数量
  uint32 page_size = 4;
}

// 获取 Event 列表响应
message GetEventsReply {
  message EventSummary {
    message Market {
      // 市场地址
      string address = 1;
      // 市场名称
      string name = 2;
      // 市场图片
      string pic_url = 3;
      // 市场状态
      uint32 status = 4;
      // 交易量
      string volume = 5;
      // 参与者数量
      uint32 participants_count = 6;
    }

    // 数据库 ID
    string id = 1;
    // on-chain eventId
    string event_id = 2;
    // 标题
    string title = 3;
    // outcome 数量
    int32 outcome_slot_count = 4;
    // 状态
    EventStatus status = 5;
    // 创建时间
    uint32 created_at = 6;
    // 子市场列表
    repeated Market markets = 7;
  }

  // 总数量
  uint32 total = 1;
  // Event 列表
  repeated EventSummary events = 2;
}

// ============================================
// CTF APMM 交易 Messages
// ============================================

// CTF Swap 交易请求
message SwapRequest {
  // 市场合约地址
  string market_address = 1;
  // 选项索引 (0 or 1, binary market)
  string option_index = 2;
  // 交易数量 (USDC)
  string amount = 3;
  // 最小接收数量 (slippage protection)
  string min_receive_amount = 4;
  // 交易方向 "buy" or "sell"
  string side = 5;
  // 用户操作信息
  UserOperation user_operation = 6;
}

// CTF Swap 交易响应
message SwapReply {
  string op_hash = 1;
  string order_uuid = 2;
}

// CTF 添加流动性请求
message DepositLiquidityRequest {
  // 市场合约地址
  string market_address = 1;
  // USDC 数量
  string amount = 2;
  // 用户操作信息
  UserOperation user_operation = 3;
}

// CTF 添加流动性响应
message DepositLiquidityReply {
  string op_hash = 1;
}

// CTF 移除流动性请求
message WithdrawLiquidityRequest {
  // 市场合约地址
  string market_address = 1;
  // LP token 数量
  string lp_amount = 2;
  // 用户操作信息
  UserOperation user_operation = 3;
}

// CTF 移除流动性响应
message WithdrawLiquidityReply {
  string op_hash = 1;
}

// CTF 赎回 Position 请求
message RedeemPositionRequest {
  // 市场合约地址
  string market_address = 1;
  // condition ID (bytes32 hex)
  string condition_id = 2;
  // index sets
  repeated string index_sets = 3;
  // 用户操作信息
  UserOperation user_operation = 4;
}

// CTF 赎回 Position 响应
message RedeemPositionReply {
  string op_hash = 1;
}

// CTF 获取 Swap 报价请求
message GetSwapPriceRequest {
  // 市场合约地址
  string market_address = 1;
  // 选项索引
  string option_index = 2;
  // 交易数量
  string amount = 3;
  // 交易方向 "buy" or "sell"
  string side = 4;
}

// CTF 获取 Swap 报价响应
message GetSwapPriceReply {
  // 预期获得数量
  string expected_amount = 1;
  // 价格影响 (bps)
  string price_impact = 2;
  // 手续费
  string fee = 3;
}
