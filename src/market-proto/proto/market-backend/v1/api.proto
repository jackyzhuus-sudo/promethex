  TX_TYPE_BUY = 1;
  TX_TYPE_SELL = 2;
  TX_TYPE_CLAIM = 3;
  TX_TYPE_MINT_POINTS = 4;
  TX_TYPE_MINT_INVITE_POINTS = 5;
  TX_TYPE_DEPOSIT = 6;
  TX_TYPE_WITHDRAW = 7;
}

message GetUserTransactionsReply {
  message Transaction {
    // 用户ID
    string uid = 1;
