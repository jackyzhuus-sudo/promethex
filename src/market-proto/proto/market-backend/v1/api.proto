      // 代币描述
      string token_description = 6;
    }
    // 帖子ID
    string uuid = 1;
    // 用户ID
    string uid = 2;
    // 用户名称
    string user_name = 3;
    // 用户头像URL
    string user_avatar_url = 4;
    // 帖子标题
    string title = 5;
    // 帖子内容
    string content = 6;
    // 点赞数
    uint32 like_count = 7;
    // 评论数
    uint32 comment_count = 8;
    // 创建时间
    uint64 timestamp = 9;
    // 是否点赞 1是2否
    uint32 is_like = 10;

    UserInfo user_info = 11;
    repeated Position positions = 12;
    // 帖子ID 用于分页
    int64 id = 13;
  }
  // 总页数
  uint32 total = 1;
  // 帖子列表
  repeated Post posts = 2;
}

// 1. 查询评论区（根评论）root_uuid为空  多返回每一个根评论下的固定个数回复
// 2. 查询根评论下的回复（子评论） root_uuid为根评论ID
message GetCommentsRequest {
  // 帖子ID
  string post_uuid = 1;
  // 根评论ID
  string root_uuid = 2;
  // 页码
  int64 page = 3;
  // 每页数量
  int64 page_size = 4;

  // 如果是查看整个评论区 传入这个值查询每个根评论下的多少个回复
  int64 reply_page_size = 5;

  // 游标分页时传
  int64 last_id = 6;
}

message GetCommentsReply {
  enum IsLike {
    IS_LIKE_UNSPECIFIED = 0;
    IS_LIKE_YES = 1;
    IS_LIKE_NO = 2;
  }
  message Comment { 
    message Position {
      // 代币地址
      string token_address = 1;
      // 代币名称
      string token_name = 2;
      // 代币图片key
      string token_pic_url = 3;
      // 代币余额
      string balance = 4;
      // 代币精度
      uint32 decimal = 5;
      // 市场地址
      string market_address = 6;
      // 代币描述
      string token_description = 7;
    }
    message Reply { 
      // 用户ID
      string uid = 1;
      // 用户名称
      string user_name = 2;
      // 用户头像URL
      string user_avatar_url = 3;
      // 市场地址
      string market_address = 4;
      // 回复ID
      string uuid = 5;
      // 父评论ID
      string parent_uuid = 6;
      // 根评论ID
      string root_uuid = 7;
      // 回复内容
      string content = 8;
      // 点赞数
      int64 like_count = 9;
      // 创建时间
      int64 created_at = 10;
      // 是否点赞 1是2否
      IsLike is_like = 11;
      // 父评论的用户名 (显示@回复用户名)
      string parent_user_name = 12;
      // 父评论的用户头像URL (显示@回复用户头像)
      string parent_user_avatar_url = 13;
      // 回复ID 用于分页
      int64 id = 14;
    }

    // 用户ID
    string uid = 1;
    // 用户名称
    string user_name = 2;
    // 用户头像URL
    string user_avatar_url = 3;

    // 回复ID
    string uuid = 4;
    // 父评论ID
    string parent_uuid = 5;
    // 根评论ID
    string root_uuid = 6;
    // 回复内容
    string content = 7;
    // 点赞数
    int64 like_count = 8;
    // 创建时间
    int64 timestamp = 9;
    // 是否点赞 1是2否
    IsLike is_like = 10;

    // 如果是回复，则显示父评论的用户名 (显示@回复用户名)
    string parent_user_name = 11;
    // 如果是回复，则显示父评论的用户头像URL (显示@回复用户头像)
    string parent_user_avatar_url = 12;
    // 该用户的持仓
    repeated Position positions = 13;
    // 回复列表
    repeated Reply replies = 14;
    // 回复总数
    int64 replies_total_count = 15;

    // 该评论的id
    int64 id = 16;
  }
  int32 total = 1;
  repeated Comment comments = 2;
}


