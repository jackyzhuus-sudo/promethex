  uint32 page = 1;
  // 每页数量
  uint32 page_size = 2;
}

message GetInviteUserListReply {
  message User {
    string uid = 1;
    string name = 2;
    string avatar = 3;
    string desc = 4;
    string email = 5;
    uint32 created_at = 6;
    uint32 invite_at = 7;
    // 提供的奖励积分
