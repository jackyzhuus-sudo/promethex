// 下单请求
// 用于在期权市场上进行交易下单
message PlaceOrderRequest {
  // 市场合约地址
  string market_address = 1;
  
  // 条件代币合约地址
  string option_address = 2;
  
  // 交易方向
  // 1: deposit - 买入期权
  // 2: withdraw - 卖出期权
  uint32 side = 3;
  
  // 交易价格
  // 下单时期望的成交价格
  string price = 4;
  
  // 交易数量
  // - 买入(deposit): 投入的基础代币数量
  // - 卖出(withdraw): 投入的条件代币数量
  string amount = 5;
  
  // 最小接收数量
  // - 买入(deposit): 最小接收的条件代币数量
  // - 卖出(withdraw): 最小接收的基础代币数量
  string min_receive_amount = 6;
  
  // 交易截止时间
  uint64 deadline = 7;
  
  // 用户操作信息
  // 包含交易所需的签名及其他链上操作参数
  UserOperation user_operation = 8;
}

// 下单响应
// 返回交易提交后的操作哈希
message PlaceOrderReply {
  // 操作哈希
  // 可用于在链上查询交易状态
  string op_hash = 1;
  // 订单唯一标识
  string order_uuid = 2;
}

