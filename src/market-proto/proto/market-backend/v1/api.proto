    // 代币名称
    string base_token_name = 2;
    // 代币符号
    string base_token_symbol = 3;
    // 代币地址
    string base_token_address = 4;
    // 代币精度
    uint32 base_token_decimals = 5;
  }
  repeated BaseToken base_tokens = 1;
}



message GetInviteUserListRequest {
