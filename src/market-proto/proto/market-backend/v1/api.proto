message GetUserNotificationsRequest {
  // 分类 1. transaction 2. mention
  uint32 category = 1;
  // 状态 1. 已读 2. 未读
  uint32 status = 2;
  // 类型 1. 注册收到初始points  3. 交易买卖 4. 市场结算  6. 收到评论/回复 7. post收到点赞 8. 被关注
  uint32 type = 3;
  // 页码
  uint32 page = 4;
  // 每页数量
  uint32 page_size = 5;
}

// 获取用户的通知列表 响应
message GetUserNotificationsReply {
  message Notification {
    // 用户ID
    string uid = 1;
    // 通知 uuid
    string uuid = 2;
    // 类型
    uint32 type = 3;
    // 分类
    uint32 category = 4;
    // 状态
    uint32 status = 5;
    // 具体业务数据json
    string biz_json = 6; 
    // 时间
    int64 created_at = 7;
