syntax = "proto3";

package api.v1;

import "google/protobuf/descriptor.proto";
import "google/api/annotations.proto";

option go_package = "market-proto/proto/market-backend/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.v1";
option java_outer_classname = "ApiProtoV1";


extend google.protobuf.MethodOptions {
    bool need_auth = 50001;  // 使用一个唯一的数字
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;

  // base
  // - client error
  PARAM                      = 110101;
  NOT_FOUND                  = 110102;
  PLEASE_WAIT                = 110103;

  // - server error
  INTERNAL                   = 110201;
  NETWORK                    = 110202;
  DATABASE                   = 110203;
  REDIS                      = 110204;
  RPC                        = 110205;

  // - third party error
  S3                         = 110301;
  ALCHEMY                    = 110302;
  PRIVY                      = 110303;
  OPENAI                     = 110304;

}

service SseApi {
  rpc Subscribe (SubscribeRequest) returns (SubscribeReply) {
    option (google.api.http) = {
      post: "/api/v1/sse/subscribe"
      body: "*"
    };
    option (need_auth) = false;
  }

  rpc Unsubscribe (UnsubscribeRequest) returns (UnsubscribeReply) {
    option (google.api.http) = {
      post: "/api/v1/sse/unsubscribe"
      body: "*"
    };
    option (need_auth) = false;
  }
}

message SubscribeRequest {
  // 可选 指定在哪个连接id订阅
  string connection_id = 1;
  // 必填 订阅的topic名
  repeated string topics = 2;
}

message SubscribeReply {
}

message UnsubscribeRequest {
  // 可选 指定在哪个连接id取消订阅
  string connection_id = 1;
  // 必填 取消订阅的topic名
  repeated string topics = 2;
}

message UnsubscribeReply {
}

