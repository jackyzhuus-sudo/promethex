message GetLeaderboardRequest {
  enum TimeInterval {
    TIME_INTERVAL_UNSPECIFIED = 0;
    TIME_INTERVAL_DAY = 1;
    TIME_INTERVAL_WEEK = 2;
    TIME_INTERVAL_MONTH = 3;
    TIME_INTERVAL_ALL = 4;
  }
  enum SortType {
    SORT_TYPE_UNSPECIFIED = 0;
    SORT_TYPE_PNL = 1;
    SORT_TYPE_VOLUME = 2;
    SORT_TYPE_TRADE_COUNT = 3;
  }

  // 时间间隔 1: 日 2: 周 3: 月 4: 全部
  TimeInterval time_interval = 1;
  // 页码
  uint32 page = 2;
  // 每页数量
  uint32 page_size = 3;
  // 排序类型 1: pnl 2: volume 3: trade_count
  SortType sort_type = 4;
  // 用户uid
  string uid = 5;
}

message GetLeaderboardResponse {
  message Entry {
    // 用户uid
    string uid = 1;
    // 用户名
    string name = 2;
    // 用户头像
    string avatar = 3;
    // 分数
    string score = 4;
    // 精度
    uint32 decimal = 5;
    // 排名
    uint32 rank = 6;
  }
  // 总数量
  uint32 total = 1;
  // 排行榜列表
  repeated Entry entries = 2;
  // 自己的排名
  Entry user_own_entry = 3;
}

message TranslateRequest {
  // 翻译文本
  string text = 1;
  // 源语言
  string source_lang = 2;
  // 目标语言
  string target_lang = 3;
}

message TranslateReply {  
  // 翻译后的文本
  string translated_text = 1;
  // 源语言
  string source_lang = 2;
  // 目标语言
  string target_lang = 3;
  // 是否来自缓存
  bool cached = 4;
  // 使用的token数量
  uint32 tokens_used = 5;
}


message ShareTaskDoneRequest {
}

message ShareTaskDoneReply {
}

message ClaimTaskRewardRequest {
  string task_key = 1;
}

message ClaimTaskRewardReply {
}


message GetTasksRequest {
}

message GetTasksReply {
  message Task {
    // 任务uuid
    string task_uuid = 1;
    // 任务唯一标识key
    string task_key = 2;
    // 任务名称
    string name = 3;
    // 任务描述
    string desc = 4;
    // 任务类型 1新手一次性任务 2每日任务
    uint32 type = 5;
    // 任务图片url
    string pic_url = 6;
    // 任务奖励积分
    uint32 reward_points = 7;
    // 任务跳转url
    string jump_url = 8;

    // 是否完成
    bool is_done = 9;

    // 是否领取奖励 1是2否
    uint32 is_claimed = 10;
    // 领取奖励时间
    uint32 claim_at = 11;
    // 领取奖励tx_hash
    string tx_hash = 12;
    // 交易上链状态 1成功 2失败 3执行中
    uint32 tx_status = 13;
  }
  uint32 total = 1;
  repeated Task tasks = 2;
  uint32 total_reward_points = 3;
}


message GetBannersRequest {
}

message GetBannersReply {
  message Banner {
    int32 weight = 1 ;
    string image = 2 ;
    int32 type = 3 ;
    string url = 4 ;
    string id = 5 ;
  }
  repeated Banner banners = 1 ;
}

message GetSectionsRequest {
}

message GetSectionsReply {
  message Section {
    message Prediction {
      string prediction = 1 ;
      int32 weight = 2 ;
      string id = 3 ;
    }
    string color = 1 ;
    string title = 2 ;
    int32 type = 3 ;
    int32 weight = 4 ;
    string id = 5 ;
    repeated Prediction predictions = 6 ;
  }
  repeated Section sections = 1 ;
}



message GetBaseTokenConfigRequest {
}

message GetBaseTokenConfigReply {
