// CTF 链上事件处理 Messages (block-listener → market-service)
// ============================================

// ConditionPreparation + ConditionResolution
message ProcessCTFConditionEventRequest {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    CONDITION_PREPARATION = 1;
    CONDITION_RESOLUTION = 2;
  }
  EventType event_type = 1;
  string condition_id = 2;       // bytes32 hex
  string oracle = 3;             // address
  string question_id = 4;        // bytes32 hex
  uint32 outcome_slot_count = 5;
  repeated string payout_numerators = 6; // Resolution only
  string tx_hash = 7;
  uint64 block_number = 8;
  uint64 block_time = 9;
}
message ProcessCTFConditionEventResponse {}

// PositionSplit + PositionsMerge + PayoutRedemption
message ProcessCTFPositionEventRequest {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    POSITION_SPLIT = 1;
    POSITIONS_MERGE = 2;
    PAYOUT_REDEMPTION = 3;
  }
  EventType event_type = 1;
  string stakeholder = 2;       // address (Split/Merge) or redeemer (Redemption)
  string collateral_token = 3;
  string parent_collection_id = 4;
  string condition_id = 5;
  repeated string partition = 6; // index sets (Split/Merge)
  repeated string index_sets = 7; // Redemption
  string amount = 8;             // split/merge amount or payout
  string tx_hash = 9;
  uint64 block_number = 10;
  uint64 block_time = 11;
}
message ProcessCTFPositionEventResponse {}

// TransferSingle + TransferBatch
message ProcessCTFTransferEventRequest {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    TRANSFER_SINGLE = 1;
    TRANSFER_BATCH = 2;
  }
  EventType event_type = 1;
  string operator = 2;
  string from = 3;
  string to = 4;
  repeated string ids = 5;      // Single: 1 elem; Batch: N elems
  repeated string values = 6;
  string tx_hash = 7;
  uint64 block_number = 8;
  uint64 block_time = 9;
}
message ProcessCTFTransferEventResponse {}

// CTFMarketResolved
message ProcessCTFMarketResolvedEventRequest {
  string market_address = 1;
  string tx_hash = 2;
  uint64 block_number = 3;
  uint64 block_time = 4;
  repeated UpdateOptionPrice option_prices = 5;
  string base_token_address = 6;
}
message ProcessCTFMarketResolvedEventResponse {}

// LiquidityAdded + CTFLiquidityRemoved
message ProcessCTFLiquidityEventRequest {
  enum EventType {
    EVENT_TYPE_UNSPECIFIED = 0;
    LIQUIDITY_ADDED = 1;
    LIQUIDITY_REMOVED = 2;
  }
  EventType event_type = 1;
  string uid = 2;
  string user_address = 3;
  string market_address = 4;
  string amount = 5;            // USDC amount
  string lp_amount = 6;         // LP tokens
  repeated string excess_positions = 7; // LiquidityRemoved only
  string tx_hash = 8;
  uint64 block_number = 9;
  uint64 block_time = 10;
  repeated UpdateOptionPrice option_prices = 11;
  string base_token_address = 12;
}
message ProcessCTFLiquidityEventResponse {}
