  }
  repeated UserMarketPosition user_market_positions = 1;
}

message GetMarketsAndOptionsInfoRequest {
  enum SortType {
    SORT_TYPE_UNKNOWN = 0;
    SORT_TYPE_LATEST = 1;
    SORT_TYPE_VOLUME = 2;
    SORT_TYPE_PARTICIPANTS = 3;
    SORT_TYPE_OLDEST = 4;
    SORT_TYPE_SIMILARITY = 5;
    SORT_TYPE_EXPIRED = 6;
  }
  // 用户uid
  string uid = 1;
  // 标签（可选）
  string tag = 2;
  // 排序方式 1: 按创建时间 2: 按交易量 3: 按参与人数 4: 按最早（无用） 5: 按相似度（可选） 6: 按过期时间
  SortType sort_type = 3; 
  string base_token_address = 4;
  uint32 status = 5;
  uint32 page = 6;
  uint32 page_size = 7;
  MarketIsShow is_show = 8; // 1: 显示 2: 隐藏
  // 标签列表  查看推荐信息流时（sort_type = 5) 随机选几个标签传入 
  repeated string hot_words = 9;
  bool not_query_price = 10; // 是否不查询价格 默认查询
  string category_id = 11; // 分类id 可选
  bool sort_asc = 12; // 是否升序 默认false即默认降序
  bool followed = 13; // 筛选关注市场
  bool min_volume_trending = 14; // 筛选 （trending标签）交易量大于配置的最小值的市场 true: 筛选 false: 不筛选(默认不筛选)
  bool soon_expired = 15; // 筛选 即将过期  true: 筛选 false: 不筛选(默认不筛选)
  bool new_market = 16; // 筛选 最新创建的16个市场  true: 筛选 false: 不筛选(默认不筛选)
  
}

enum MarketIsShow {
  MARKET_IS_SHOW_UNSPECIFIED = 0;
  MARKET_IS_SHOW_SHOW = 1;
  MARKET_IS_SHOW_HIDE = 2;
}

enum QuestionShow {
  UNSPECIFIED = 0;
  SHOW = 1;
  HIDE = 2;
}

enum IsFollowed {
  IS_FOLLOWED_UNSPECIFIED = 0;
  IS_FOLLOWED_YES = 1;
  IS_FOLLOWED_NO = 2;
}

message GetMarketsAndOptionsInfoResponse {
  message Market {
    message Option {
      string address = 1;
      string name = 2;
      string symbol = 3;
      string pic_url = 4;
      uint32 decimal = 5;
      uint32 index = 6;

      string price = 7;
      string description = 8;
      string position_id = 9;  // ERC1155 token ID
    }

    string address = 1;
    string name = 2;
    string pic_url = 3;
    string description = 4;
    uint32 status = 5;
    uint32 participants_count = 6;
    string volume = 7;
    string base_token_address = 8; 
    IsFollowed is_followed = 9;
    uint32 decimal = 10;  // 精度

    repeated Option options = 11;
    int64 id = 12; // 市场ID 用于分页
    uint32 created_at = 13;
    uint32 deadline = 14;
    string result = 15;
    // CTF fields
    string event_id = 16;         // NegRisk Event ID
    string condition_id = 17;     // CTF conditionId
    string question_id = 18;     // CTF questionId
    int32 outcome_slot_count = 19; // 结果数量
  }


  uint32 total = 1;
  repeated Market markets = 2;
}


message UpdateOptionPrice {
  string address = 1;
  string price = 2;
  uint32 decimal = 3;
}

message ProcessMarketDepositOrWithdrawEventRequest {
  enum Side {
    SIDE_UNSPECIFIED = 0;
    SIDE_DEPOSIT = 1;
    SIDE_WITHDRAW = 2;
  }
  Side side = 1;
  // 用户uid
  string uid = 2;
  // 市场地址
  string market_address = 3;
  // 用户地址
  string user_address = 4;
  // 该事件交易的条件代币地址
  string user_option_token_address = 5;
  // 该事件交易的条件代币用户余额
  string user_option_token_balance = 6;
  // deposit买：投入的资产代币数量 withdraw卖：投入的条件代币数量
  string amount_in = 7;
  // deposit买：实际接收的条件代币数量 withdraw卖：实际接收的资产代币数量
  string amount_out = 8;
  // 成交价格
  string price = 9;
  // 区块高度
  uint64 block_number = 10;
  // 交易hash
  string tx_hash = 11;
  // 区块时间
  uint64 block_time = 12;

  string base_token_address = 13;
  uint32 decimal = 14;
  // 条件代币价格
  repeated UpdateOptionPrice option_prices = 15;
}

message ProcessMarketDepositOrWithdrawEventResponse {
}

message ProcessMarketSwapEventRequest {
  repeated UpdateOptionPrice option_prices = 1;
  uint64 block_number = 2;
  string tx_hash = 3;
  string base_token_address = 4;
  uint64 block_time = 5;
}

message ProcessMarketSwapEventResponse {
}

message CreateMarketsAndOptionsRequest {
  message Option {
    string name = 1;
    string address = 2;
    string symbol = 3;
    string description = 4;
    uint32 decimal = 5;
    uint32 index = 6;
    string position_id = 7;  // ERC1155 token ID
  }

  message Market {
    string name = 1;
    string address = 2;
    string base_token_address = 3;
    string oracle_address = 4;
    uint64 deadline = 5;
    string tx_hash = 6;
    repeated Option options = 7;
    // CTF fields
    string event_id = 8;         // NegRisk Event ID (bytes32 hex)
    string condition_id = 9;     // CTF conditionId (bytes32 hex)
    string question_id = 10;     // CTF questionId (bytes32 hex)
    int32 outcome_slot_count = 11; // 结果数量
  }

  repeated Market markets = 1;
}

message CreateMarketsAndOptionsResponse {
}

message TokenBalance {
