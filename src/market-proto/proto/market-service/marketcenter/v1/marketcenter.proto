message GetMarketsAndOptionsForBlockListenerRequest {
  repeated string market_addresses = 1;
}

message GetMarketsAndOptionsForBlockListenerResponse {
  message Market {
    message Option {
      string address = 1;
      uint32 index = 2;
      string market_address = 3;
      uint32 decimal = 4;
      string base_token_address = 5;
    }

    string address = 1;
    string base_token_address = 2;
    repeated Option options = 3;
  }

  repeated Market markets = 1;
}

// UserOperation 0.7
message UserOperation {
  string sender = 1;                    // 合约钱包地址
  string nonce = 2;                     // 交易序号
  string init_code = 3;                 // 合约部署代码
  string call_data = 4;                 // 调用数据
  string call_gas_limit = 5;            // 执行gas限制
  string verification_gas_limit = 6;     // 验证gas限制
  string pre_verification_gas = 7;       // 预验证gas
  string max_fee_per_gas = 8;           // 最大gas价格
  string max_priority_fee_per_gas = 9;   // 最大优先gas价格
  string signature = 10;                 // 签名

  // 0.7新增字段
  string factory = 11;                   // 工厂合约地址
  string factory_data = 12;              // 工厂数据
  string paymaster = 13;                 // paymaster地址
  string paymaster_data = 14;            // paymaster数据
  string paymaster_verification_gas_limit = 15;  // paymaster验证gas限制
  string paymaster_post_op_gas_limit = 16;      // paymaster后处理gas限制
}

message PlaceOrderRequest {
  enum Side {
    SIDE_UNSPECIFIED = 0;
    SIDE_DEPOSIT = 1;
    SIDE_WITHDRAW = 2;
  }

  string uid = 1;
  string market_address = 2;
  string option_address = 3;
  Side side = 4;
  string price = 5; // 下单时期望的价格
  string amount = 6; // deposit买 amount为投入的基础代币数量 / withdraw卖 amount为投入的条件代币数量
  string min_receive_amount = 7; // deposit买 min_receive_amount为最小接收的条件代币数量 / withdraw卖 min_receive_amount为最小接收的基础代币数量
  uint64 deadline = 8; // 截止时间
  UserOperation user_operation = 9; // 前端构建的userOperation结构
}

message PlaceOrderResponse {
  string op_hash = 1;
  string order_uuid = 2;
}

message ClaimMarketResultRequest {
  string uid = 1;
  string market_address = 2;
  string option_address = 3;
  UserOperation user_operation = 5;
}

message ClaimMarketResultResponse {
  string op_hash = 1;
}

message TransferBaseTokenRequest {
  string uid = 1;
  string base_token_address = 2;
  string amount = 3;
  string to_address = 4;
  UserOperation user_operation = 5;
}

message TransferBaseTokenResponse {
  string op_hash = 1;
}

message GetOptionTokensPriceRequest {
  message Option {
    string address = 1;
    string market_address = 2;
    uint32 index = 3;

  }
  repeated Option options = 1;
}

message GetOptionTokensPriceResponse {
  message OptionPrice {
    string address = 1;
    string price = 2;
