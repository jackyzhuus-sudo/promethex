syntax = "proto3";

package marketcenter.v1;

option go_package = "market-service/api/marketcenter/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.marketcenter.v1";
option java_outer_classname = "MarketcenterProtoV1";



enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;

  // base
  // - client error
  PARAM                  = 110101;
  NOT_FOUND              = 110102;

  // - server error
  INTERNAL               = 110201;
  NETWORK                = 110202;
  DATABASE               = 110203;
  REDIS                  = 110204;
  RPC                    = 110205;

  // - third party error
  S3                     = 110301;
  ALCHEMY                = 110302;

  // business error

  // - market
  MARKET_NOT_FOUND       = 113101;
  REPEAT_FOLLOW_MARKET   = 113102;
  MUST_FOLLOW_FIRST      = 113103;
  FOLLOW_MARKET_TOO_QUICK = 113104;

  // - asset
  INVALID_USER_OPERATION = 114101;
  PLACE_ORDER_TOO_QUICK = 114102;
  TRADING_NOT_READY = 114103;

  // - event
  EVENT_NOT_FOUND        = 115101;
  EVENT_ALREADY_EXISTS   = 115102;
}

// Marketcenter服务定义
// 提供市场中心相关功能，包括市场查询、市场交易等
service Marketcenter {

    rpc GetPayMasterData(GetPayMasterDataRequest) returns (GetPayMasterDataResponse) {}

    rpc UpdateUserMarketFollowStatus(UpdateUserMarketFollowStatusRequest) returns (UpdateUserMarketFollowStatusResponse) {}
    rpc PlaceOrder(PlaceOrderRequest) returns (PlaceOrderResponse) {}
    rpc ClaimMarketResult(ClaimMarketResultRequest) returns (ClaimMarketResultResponse) {}
    rpc TransferBaseToken(TransferBaseTokenRequest) returns (TransferBaseTokenResponse) {}
    rpc GetOptionTokensPrice(GetOptionTokensPriceRequest) returns (GetOptionTokensPriceResponse) {}
    // 获取某市场下用户的持仓情况
    rpc GetMarketUsersPositions(GetMarketUsersPositionsRequest) returns (GetMarketUsersPositionsResponse) {}

    rpc GetHotMarkets(GetHotMarketsRequest) returns (GetHotMarketsResponse) {}
    rpc GetFollowedMarkets(GetFollowedMarketsRequest) returns (GetFollowedMarketsResponse) {}
    // 获取用户有持仓的市场信息
    rpc GetHoldingPositionsMarkets(GetHoldingPositionsMarketsRequest) returns (GetHoldingPositionsMarketsResponse) {}
    rpc GetMarketDetail(GetMarketDetailRequest) returns (GetMarketDetailResponse) {}
    rpc GetMarketTrades(GetMarketTradesRequest) returns (GetMarketTradesResponse) {}
    rpc GetUserPositions(GetUserPositionsRequest) returns (GetUserPositionsResponse) {}
    rpc GetUserTrades(GetUserTradesRequest) returns (GetUserTradesResponse) {}
    rpc GetUserLatestAssetValue(GetUserLatestAssetValueRequest) returns (GetUserLatestAssetValueResponse) {}
    rpc SearchMarket(SearchMarketRequest) returns (SearchMarketResponse) {}
    rpc GetUserAssetHistory(GetUserAssetHistoryRequest) returns (GetUserAssetHistoryResponse) {}
    rpc GetMarketOptionPriceHistory(GetMarketOptionPriceHistoryRequest) returns (GetMarketOptionPriceHistoryResponse) {}

    rpc GetMarketTags(GetMarketTagsRequest) returns (GetMarketTagsResponse) {}
    rpc GetMarketCategories(GetMarketCategoriesRequest) returns (GetMarketCategoriesResponse) {}

    // 分页获取市场信息
    rpc GetMarketsAndOptionsInfo(GetMarketsAndOptionsInfoRequest) returns (GetMarketsAndOptionsInfoResponse) {}
    // 批量查询市场用户的持仓
    rpc BatchGetMarketUsersPositions(BatchGetMarketUsersPositionsRequest) returns (BatchGetMarketUsersPositionsResponse) {}

    // 爬块监听链上事件后调用
    rpc GetMarketsAndOptionsForBlockListener(GetMarketsAndOptionsForBlockListenerRequest) returns (GetMarketsAndOptionsForBlockListenerResponse) {}
    rpc CreateMarketsAndOptions(CreateMarketsAndOptionsRequest) returns (CreateMarketsAndOptionsResponse) {} // 创建市场和条件

    rpc ProcessMarketDepositOrWithdrawEvent(ProcessMarketDepositOrWithdrawEventRequest) returns (ProcessMarketDepositOrWithdrawEventResponse) {} // 处理市场押注或撤回事件
    rpc ProcessMarketSwapEvent(ProcessMarketSwapEventRequest) returns (ProcessMarketSwapEventResponse) {} // 处理市场换仓事件
    rpc ProcessMarketClaimResultEvent(ProcessMarketClaimResultEventRequest) returns (ProcessMarketClaimResultEventResponse) {} // 
    rpc ProcessMarketSettingEvent(ProcessMarketSettingEventRequest) returns (ProcessMarketSettingEventResponse) {} // 处理市场设置事件
    rpc ProcessMarketAssertDisputedEvent(ProcessMarketAssertDisputedEventRequest) returns (ProcessMarketAssertDisputedEventResponse) {} // 处理市场断言争议事件
    rpc ProcessMarketAssertionResolvedEvent(ProcessMarketAssertionResolvedEventRequest) returns (ProcessMarketAssertionResolvedEventResponse) {} // 处理市场断言解决事件

    rpc UpdateUserBaseTokenBalance(UpdateUserBaseTokenBalanceRequest) returns (UpdateUserBaseTokenBalanceResponse) {} // 更新用户基础代币余额
    rpc BatchUpdateOptionPrice(BatchUpdateOptionPriceRequest) returns (BatchUpdateOptionPriceResponse) {} // 批量更新条件代币价格
    rpc UpdateMarketStatus(UpdateMarketStatusRequest) returns (UpdateMarketStatusResponse) {} // 更新市场状态(结算 争议 解决 结束)

    rpc UpdateMarketInfo(UpdateMarketInfoRequest) returns (UpdateMarketInfoResponse) {} // 更新市场信息

    rpc GetUserTransactions(GetUserTransactionsRequest) returns (GetUserTransactionsResponse) {}
    
    rpc GetBanners(GetBannersRequest) returns (GetBannersResponse) {}
    rpc GetSections(GetSectionsRequest) returns (GetSectionsResponse) {}

    rpc GetLeaderboard(GetLeaderboardRequest) returns (GetLeaderboardResponse) {}

    rpc GetQuestionDetail(GetQuestionDetailRequest) returns (GetQuestionDetailResponse) {}

    // CTF Event 相关
    rpc GetEvent(GetEventRequest) returns (GetEventResponse) {}
    rpc ListEvents(ListEventsRequest) returns (ListEventsResponse) {}
    rpc CreateEvent(CreateEventRequest) returns (CreateEventResponse) {}

    // CTF APMM 交易接口
    rpc CTFSwap(CTFSwapRequest) returns (CTFSwapResponse) {}
    rpc CTFDepositLiquidity(CTFDepositLiquidityRequest) returns (CTFDepositLiquidityResponse) {}
    rpc CTFWithdrawLiquidity(CTFWithdrawLiquidityRequest) returns (CTFWithdrawLiquidityResponse) {}
    rpc CTFRedeemPosition(CTFRedeemPositionRequest) returns (CTFRedeemPositionResponse) {}
    rpc CTFGetSwapPrice(CTFGetSwapPriceRequest) returns (CTFGetSwapPriceResponse) {}

    // CTF 链上事件处理 (block-listener → market-service)
    rpc ProcessCTFConditionEvent(ProcessCTFConditionEventRequest) returns (ProcessCTFConditionEventResponse) {}
    rpc ProcessCTFPositionEvent(ProcessCTFPositionEventRequest) returns (ProcessCTFPositionEventResponse) {}
    rpc ProcessCTFTransferEvent(ProcessCTFTransferEventRequest) returns (ProcessCTFTransferEventResponse) {}
    rpc ProcessCTFMarketResolvedEvent(ProcessCTFMarketResolvedEventRequest) returns (ProcessCTFMarketResolvedEventResponse) {}
    rpc ProcessCTFLiquidityEvent(ProcessCTFLiquidityEventRequest) returns (ProcessCTFLiquidityEventResponse) {}

}

message GetLeaderboardRequest {
  enum TimeInterval {
    TIME_INTERVAL_UNSPECIFIED = 0;
    TIME_INTERVAL_DAY = 1;
    TIME_INTERVAL_WEEK = 2;
    TIME_INTERVAL_MONTH = 3;
    TIME_INTERVAL_ALL = 4;
  }
  enum SortType {
    SORT_TYPE_UNSPECIFIED = 0;
    SORT_TYPE_PNL = 1;
    SORT_TYPE_VOLUME = 2;
    SORT_TYPE_TRADE_COUNT = 3;
  }

  TimeInterval time_interval = 1;
  uint32 page = 2;
  uint32 page_size = 3;
  string base_token_address = 4;
  string uid = 5;
  SortType sort_type = 6;
}

message GetLeaderboardResponse {
  message Entry {
    string uid = 1;
    string score = 2;
    uint32 decimal = 3;
    uint32 rank = 4;
  }
  uint32 total = 1;
  repeated Entry entries = 2;
  Entry user_own_entry = 3;
}

message GetQuestionsRequest {
  enum SortType {
    UNKNOWN = 0;
    CREATED = 1;
    VOLUME = 2;
    PARTICIPANTS = 3;
    EXPIRED = 4;
  }
  // 用户uid
  string uid = 1;
  // 标签（可选）
  string tag = 2;
  // 排序方式 1: 按创建时间 2: 按交易量 3: 按参与人数 4: 按过期时间
  SortType sort_type = 3; 
  string base_token_address = 4;
  uint32 status = 5;
  uint32 page = 6;
  uint32 page_size = 7;
  MarketIsShow is_show = 8; // 1: 显示 2: 隐藏
  string category_id = 11; // 分类id 可选
  bool sort_asc = 12; // 是否升序 默认false即默认降序
  bool followed = 13; // 筛选关注市场
  bool min_volume_trending = 14; // 筛选 （trending标签）交易量大于配置的最小值的市场 true: 筛选 false: 不筛选(默认不筛选)
  bool soon_expired = 15; // 筛选 即将过期  true: 筛选 false: 不筛选(默认不筛选)
  bool new_market = 16; // 筛选 最新创建的16个市场  true: 筛选 false: 不筛选(默认不筛选)
  
}

message GetQuestionsResponse {

  message Question {
    message Market {
      message Option {
        string address = 1;
        string name = 2;
        string symbol = 3;
        string pic_url = 4;
        uint32 decimal = 5;
        uint32 index = 6;
        string description = 7;

        string price = 8;
      }
  
      string address = 1;
      string name = 2;
      string pic_url = 3;
      string description = 4;
      uint32 status = 5;
      uint32 participants_count = 6;
      string volume = 7;
      string base_token_address = 8; 
      uint32 decimal = 10;  // 精度
  
      repeated Option options = 11;
      uint32 created_at = 13;
      uint32 deadline = 14;
      string result = 15;
    }

    string question_uuid = 1;
    string name = 2;
    string description = 3;
    string pic_url = 4;
    uint32 status = 7; // 1: 正常 2: 结算中 3: 有争议 4: 已结束
    uint32 participants_count = 8;
    string volume = 9;
    string base_token_address = 10; 
    uint32 decimal = 11;  // 精度
    uint32 created_at = 12;
    uint32 deadline = 13;

    repeated Market markets = 15;

  }
 


  uint32 total = 1;
  repeated Question questions = 2;
}

message GetQuestionDetailRequest {
  string uid = 1;
  string question_uuid = 2;
}

message GetQuestionDetailResponse {
  enum IsClaim {
    IS_CLAIMED_UNSPECIFIED = 0;
    IS_CLAIMED_YES = 1;
    IS_CLAIMED_NO = 2;
  }
  message Market {
    message Option {
      string address = 1;
      string name = 2;
      string symbol = 3;
      string pic_url = 4;
      string price = 5;
      uint32 decimal = 6;
      string description = 7;
    }

    string address = 1;
    string name = 2;
    string pic_url = 3;
    string description = 4;
    uint64 deadline = 5;
    string volume = 6;
    uint64 participants_count = 7;
    string result_option_address = 8;
    uint32 status = 9; // 1: 正常 2: 结算中 3: 有争议 4: 已结束
    string base_token_address = 11; // points或者usdc等的合约地址
    // 是否以领取结果 
    IsClaim is_claim = 12;
    repeated Option options = 13;
  }


  string question_uuid = 1;
  string name = 2;
  string description = 3;
  string pic_url = 4;
  string rules = 5;
  string rules_file_url = 6;
  uint32 status = 7; // 1: 正常 2: 结算中 3: 有争议 4: 已结束
  string base_token_address = 9; // points或者usdc等的合约地址
  // 是否以领取结果 
  IsClaim is_claim = 10;
}



message UpdateMarketInfoRequest {
  string market_address = 1;
}

message UpdateMarketInfoResponse {
}

