// ==================== CTF Event Messages ====================

// PredictionEvent 表示一个 NegRisk Event，包含多个子市场
message PredictionEvent {
  message Market {
    message Option {
      string address = 1;
      string name = 2;
      string symbol = 3;
      string pic_url = 4;
      uint32 decimal = 5;
      uint32 index = 6;
      string price = 7;
      string description = 8;
      string position_id = 9;  // ERC1155 token ID
    }

    string address = 1;
    string name = 2;
    string pic_url = 3;
    string description = 4;
    uint32 status = 5;
    uint32 participants_count = 6;
    string volume = 7;
    uint32 decimal = 8;
    uint32 created_at = 9;
    uint32 deadline = 10;
    string result = 11;
    string condition_id = 12;     // CTF conditionId
    string question_id = 13;     // CTF questionId

    repeated Option options = 14;
  }

  string id = 1;                       // UUID
  string event_id = 2;                 // on-chain NegRisk eventId (bytes32 hex)
  string title = 3;
  int32 outcome_slot_count = 4;
  string collateral = 5;              // USDC 地址
  EventStatus status = 6;
  string metadata_hash = 7;
  uint32 created_at = 8;
  uint32 updated_at = 9;

  repeated Market markets = 10;        // 子市场列表
}

message GetEventRequest {
  string id = 1;            // UUID or event_id
  string uid = 2;           // 用户ID（用于查询关注状态等）
}

message GetEventResponse {
  PredictionEvent event = 1;
}

message ListEventsRequest {
  enum SortType {
    SORT_TYPE_UNKNOWN = 0;
    SORT_TYPE_LATEST = 1;
    SORT_TYPE_VOLUME = 2;
  }
  string uid = 1;
  EventStatus status = 2;
  SortType sort_type = 3;
  uint32 page = 4;
  uint32 page_size = 5;
}

message ListEventsResponse {
  uint32 total = 1;
  repeated PredictionEvent events = 2;
}

message CreateEventRequest {
  string event_id = 1;               // on-chain NegRisk eventId (bytes32 hex)
  string title = 2;
  int32 outcome_slot_count = 3;
  string collateral = 4;             // USDC 地址
  string metadata_hash = 5;
}

message CreateEventResponse {
  string id = 1;                      // 创建后的 UUID
}

