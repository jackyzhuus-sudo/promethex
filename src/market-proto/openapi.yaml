                        最大gas价格
                         愿意支付的最高gas价格
                maxPriorityFeePerGas:
                    type: string
                    description: |-
                        最大优先gas价格
                         愿意支付给矿工的最大优先费用
                signature:
                    type: string
                    description: |-
                        交易签名
                         用户对交易的ECDSA签名
                factory:
                    type: string
                    description: |-
                        工厂合约地址
                         创建合约钱包的工厂合约地址 (0.7新增)
                factoryData:
                    type: string
                    description: |-
                        factory数据
                         factory合约的验证数据 (0.7新增)
                paymaster:
                    type: string
                    description: |-
                        Paymaster地址
                         代付gas费的Paymaster合约地址 (0.7新增)
                paymasterData:
                    type: string
                    description: |-
                        Paymaster数据
                         Paymaster合约的验证数据 (0.7新增)
                paymasterVerificationGasLimit:
                    type: string
                    description: |-
                        Paymaster验证gas限制
                         Paymaster验证阶段的gas限制 (0.7新增)
                paymasterPostOpGasLimit:
                    type: string
                    description: |-
                        Paymaster后处理gas限制
                         Paymaster后处理操作的gas限制 (0.7新增)
            description: |-
                用户操作信息 (UserOperation 0.7)
                 包含区块链交易所需的完整参数集
