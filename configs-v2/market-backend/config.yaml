# market-backend v2 配置 — hostnames point to v2 containers
server:
  http:
    network: tcp
    addr: :8000
    timeout: 60s

data:
  redis:
    network: tcp
    addr: v2-market-redis:6379
    db: 0
    password: "${REDIS_PASSWORD}"
    read_timeout: 60s
    write_timeout: 60s
    dial_timeout: 60s

  rpc:
    usercenter_rpc:
      addr: v2-market-service:9000
      timeout: 60s
    marketcenter_rpc:
      addr: v2-market-service:9000
      timeout: 60s

  privy:
    verification_key: |
      -----BEGIN PUBLIC KEY-----
      MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEM7hHwpZXAWTC185QpPRceE6SfLQT
      Ems1VgHaVuUU3mrSyb2nm5DQA1iZfL7AZ2QptjkIW8OiyPxJqzwEAameiA==
      -----END PUBLIC KEY-----
    app_id: "${PRIVY_APP_ID}"
    app_secret: "${PRIVY_APP_SECRET}"

  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "${OPENAI_BASE_URL}"
    model: gpt-4o-mini
    temperature: 0.7
    max_tokens: 2048
    top_p: 1
    frequency_penalty: 0
    presence_penalty: 0
    prompt_template: |
      你是一个精准、简洁的专业翻译助手：
      - 仅返回目标语言文本，不要包含解释或多余内容
      - 保留专有名词与代币符号（如 USDC、POINTS）
      - 保持语气自然一致，避免直译痕迹

custom:
  env: dev
  need_auth: true
  lark_webhook_key: "${LARK_WEBHOOK_KEY}"
  lark_enabled: false
  asset_tokens:
    points:
      address: "0x934E616cA9538397E3f9a12895C40ea2E8C45E48"
      name: Points
      symbol: POINTS
      decimals: 18
    usdc:
      address: "0x1A8da4723A4f7aD0A965cb3dBC31c72435b1B490"
      name: USD Coin
      symbol: tUSDC
      decimals: 6
