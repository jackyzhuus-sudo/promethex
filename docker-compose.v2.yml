# V2 Parallel Deployment — completely isolated from V1
# Usage: docker compose -p prome-v2 -f docker-compose.v2.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: v2-market-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-market-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-market-password}
      POSTGRES_DB: postgres
    volumes:
      - ./sql/00-initdb.sql:/docker-entrypoint-initdb.d/00-initdb.sql
      - ./sql:/sql:ro
      - v2-postgres-data:/var/lib/postgresql
    restart: always
    networks:
      - market-net-v2
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  redis:
    image: redis:8
    container_name: v2-market-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-market_redis_password}"]
    ports:
      - "6381:6379"
    volumes:
      - v2-redis-data:/data
    restart: always
    networks:
      - market-net-v2
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  market-backend:
    container_name: v2-market-backend
    build:
      context: ./src/market-backend
      dockerfile: Dockerfile
      additional_contexts:
        - market-proto=./src/market-proto
    restart: always
    depends_on:
      - market-service
      - postgres
      - redis
    ports:
      - "8001:8000"
    volumes:
      - ./configs-v2/market-backend/config.yaml:/app/configs/config.yaml
    environment:
      - TZ=Asia/Shanghai
    networks:
      - market-net-v2
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  block-listener:
    container_name: v2-block-listener
    build:
      context: ./src/block-listener
      dockerfile: Dockerfile
      additional_contexts:
        - market-proto=./src/market-proto
    restart: always
    depends_on:
      - market-service
      - postgres
      - redis
    ports:
      - "8082:8080"
    volumes:
      - ./configs-v2/block-listener/config.yaml:/app/configs/config.yaml
    environment:
      - TZ=Asia/Shanghai
    networks:
      - market-net-v2
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  market-service:
    container_name: v2-market-service
    build:
      context: ./src/market-service
      dockerfile: Dockerfile
      additional_contexts:
        - market-proto=./src/market-proto
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "9003:9000"
    volumes:
      - ./configs-v2/market-service/config.yaml:/app/configs/config.yaml
    environment:
      - TZ=Asia/Shanghai
    networks:
      - market-net-v2
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

volumes:
  v2-postgres-data:
  v2-redis-data:

networks:
  market-net-v2:
    driver: bridge
