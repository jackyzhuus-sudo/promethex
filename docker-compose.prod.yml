# Prome V2 Production Deployment
# Usage: docker compose -p prome-prod -f docker-compose.prod.yml up -d
# Requires: .env.production file with all secrets

services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: prod-market-postgres
    ports:
      - "127.0.0.1:5434:5432"
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - ./sql/00-initdb.sql:/docker-entrypoint-initdb.d/00-initdb.sql
      - ./sql:/sql:ro
      - prod-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - market-net-prod
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  redis:
    image: redis:8-alpine
    container_name: prod-market-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6381:6379"
    volumes:
      - prod-redis-data:/data
    restart: unless-stopped
    networks:
      - market-net-prod
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  market-backend:
    image: ${GHCR_REGISTRY:-ghcr.io/jackyzhuus-sudo/prome}/market-backend:${IMAGE_TAG:-latest}
    build:
      context: ./src/market-backend
      dockerfile: Dockerfile
      additional_contexts:
        - market-proto=./src/market-proto
    container_name: prod-market-backend
    restart: unless-stopped
    depends_on:
      market-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./configs-v2/market-backend/config.yaml:/app/configs/config.yaml:ro
    environment:
      - TZ=UTC
    env_file:
      - .env.production
    networks:
      - market-net-prod
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  market-service:
    image: ${GHCR_REGISTRY:-ghcr.io/jackyzhuus-sudo/prome}/market-service:${IMAGE_TAG:-latest}
    build:
      context: ./src/market-service
      dockerfile: Dockerfile
      additional_contexts:
        - market-proto=./src/market-proto
    container_name: prod-market-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:9000:9000"
    volumes:
      - ./configs-v2/market-service/config.yaml:/app/configs/config.yaml:ro
    environment:
      - TZ=UTC
    env_file:
      - .env.production
    networks:
      - market-net-prod
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  block-listener:
    image: ${GHCR_REGISTRY:-ghcr.io/jackyzhuus-sudo/prome}/block-listener:${IMAGE_TAG:-latest}
    build:
      context: ./src/block-listener
      dockerfile: Dockerfile
      additional_contexts:
        - market-proto=./src/market-proto
    container_name: prod-block-listener
    restart: unless-stopped
    depends_on:
      market-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./configs-v2/block-listener/config.yaml:/app/configs/config.yaml:ro
    environment:
      - TZ=UTC
    env_file:
      - .env.production
    networks:
      - market-net-prod
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "10"

  nginx:
    image: nginx:1.27-alpine
    container_name: prod-nginx
    restart: unless-stopped
    depends_on:
      market-backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:80:80"
    volumes:
      - ../../infra/nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - market-net-prod
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  prod-postgres-data:
  prod-redis-data:

networks:
  market-net-prod:
    driver: bridge
