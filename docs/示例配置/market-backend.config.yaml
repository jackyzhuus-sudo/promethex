# server：HTTP 服务配置
server:
  http:
    network: tcp            # 监听网络协议（一般为 tcp）
    addr: :8000             # 服务监听地址与端口（默认 :8000）
    timeout: 60s             # 请求处理超时时间
data:
  # redis：BFF 使用的缓存（默认连接宿主机 6379）
  redis:
    network: tcp                    # 连接协议
    addr: host.docker.internal:6379 # Redis 地址（容器访问宿主机）
    db: 0                           # 逻辑库索引（0-15），用于隔离不同业务
    password: ""                    # Redis 密码（为空表示无密码）
    read_timeout: 60s                # 读超时
    write_timeout: 60s               # 写超时
    dial_timeout: 60s                # 连接超时
  rpc:
    usercenter_rpc:
      addr: host.docker.internal:9000 # 上游 usercenter gRPC 地址（market-service 暴露）
      timeout: 60s                     # gRPC 调用超时
    marketcenter_rpc:
      addr: host.docker.internal:9000 # 上游 marketcenter gRPC 地址（与 usercenter 同服务）
      timeout: 60s                     # gRPC 调用超时
  privy:
    verification_key: ""             # Privy JWT 验签公钥（PEM/ES256），用于校验前端令牌
    app_id: ""                       # Privy 应用 ID（用于鉴权检查与 API 调用）
    app_secret: ""                   # Privy 应用密钥（访问 Privy API 使用，不参与 JWT 验签）
  openai:
    api_key: ""                      # OpenAI 或兼容服务商 API Key
    base_url: "https://rpc.example.openai/v1" # 兼容服务商基础地址（统一在配置文件管理）
    model: gpt-4o-mini               # 模型名称
    temperature: 0.7                 # 采样温度
    max_tokens: 2048                 # 最大生成 token 数
    top_p: 1                         # Top-p 采样
    frequency_penalty: 0             # 频率惩罚
    presence_penalty: 0              # 出现惩罚
    prompt_template: |-              # 提示词模板（多行字符串）
      你是一个精准、简洁的专业翻译助手：
      - 仅返回目标语言文本，不要包含解释或多余内容
      - 保留专有名词与代币符号（如 USDC、POINTS）
      - 保持语气自然一致，避免直译痕迹
      - 若输入包含技术术语，优先采用社区通行译法
custom:
  env: dev                          # 环境标识（如 dev/staging/prod）
  need_auth: false                  # 是否开启鉴权（true 需要校验 Privy JWT）
  lark_webhook_key: ""              # 飞书告警 Webhook Key
  lark_enabled: false               # 是否启用飞书告警
  asset_tokens:
    points:
      address: "0x934E616cA9538397E3f9a12895C40ea2E8C45E48" # Points 代币地址（示例）
      name: Points                                        # 代币名称
      symbol: POINTS                                      # 代币符号
      decimals: 18                                        # 小数位数
    usdc:
      address: "0x934E616cA9538397E3f9a12895C40ea2E8C45E48" # USDC 代币地址（示例）
      name: USD Coin                                     # 代币名称
      symbol: USDC                                       # 代币符号
      decimals: 6                                        # 小数位数
