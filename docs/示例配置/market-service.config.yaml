# server：gRPC 服务配置
server:
  grpc:
    network: tcp    # 监听网络协议（一般为 tcp）
    addr: :9000     # gRPC 监听地址与端口
    timeout: 60s     # 请求处理超时时间
data:
  # postgresql：业务数据库连接（用户中心与市场中心分别使用独立库）
  postgresql:
    usercenter:
      dsn: postgresql://market-user:market-password@host.docker.internal:5432/usercenter?sslmode=disable # 连接串
      max_idle_conns: 5       # 最大空闲连接数
      max_open_conns: 20      # 最大打开连接数
      conn_max_lifetime: 3600s   # 连接最大生命周期
    marketcenter:
      dsn: postgresql://market-user:market-password@host.docker.internal:5432/marketcenter?sslmode=disable # 连接串
      max_idle_conns: 5       # 最大空闲连接数
      max_open_conns: 20      # 最大打开连接数
      conn_max_lifetime: 3600s   # 连接最大生命周期
  redis:
    usercenter:
      network: tcp                    # 连接协议
      addr: host.docker.internal:6379 # Redis 地址
      db: 0                           # 逻辑库索引（0-15）
      password: ""                    # Redis 密码
      read_timeout: 60s                # 读超时
      write_timeout: 60s               # 写超时
      dial_timeout: 60s                # 连接超时
    marketcenter:
      network: tcp                    # 连接协议
      addr: host.docker.internal:6379 # Redis 地址
      db: 1                           # 逻辑库索引（建议与用户中心区分）
      password: ""                    # Redis 密码
      read_timeout: 60s                # 读超时
      write_timeout: 60s               # 写超时
      dial_timeout: 60s                # 连接超时
  alchemy:
    api_key: ""             # Alchemy API Key
    network: sepolia        # 网络名称（如 sepolia）
    chain_id: 11155111      # 链 ID（Sepolia：11155111）
    policy_id: ""           # Gas Manager 策略 ID（pm_* 与 requestGas 调用需要）
    entrypoint_address: ""  # EIP-4337 EntryPoint 地址（eth_sendUserOperation 等调用使用）
    fallback_address: ""    # 备用地址（当前代码未使用，可留空）
    sign_tx_from_address: "" # 服务端签名交易的 from 地址（当前代码未使用，可留空）
    sign_tx_private_key: ""  # 服务端私钥（仅当需要服务端主动签 EOA 交易时必填）
  s3:
    access_key: ""          # 对象存储 Access Key
    secret_key: ""          # 对象存储 Secret Key
    biz_bucket: ""          # 业务桶名
    admin_bucket: ""        # 后台桶名
    region: ""              # 区域
  rpc:
    recommendation_rpc:
      addr: host.docker.internal:50051 # 推荐服务 gRPC 地址
      timeout: 3s                      # gRPC 调用超时
custom:
  asset_tokens:                      # key = lowercase hex address
    "0x...points_address...":
      name: Points     # 代币名称
      symbol: POINTS   # 代币符号
      decimals: 18     # 小数位数
    "0x...usdc_address...":
      name: USD Coin   # 代币名称
      symbol: USDC     # 代币符号
      decimals: 6      # 小数位数
  new_user_points: 0   # 新用户默认积分
  chain: sepolia       # 业务默认链标识
  lark_webhook_key: "" # 飞书告警 Webhook Key
  lark_enabled: false  # 是否启用飞书告警
  min_volume: 0        # 最小交易量
  max_deadline_hours: 24 # 最大截止小时数
